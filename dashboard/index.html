<!DOCTYPE html>
<html>
<head>
  <title>System-Fixer Dashboard</title>
  <script src="data.js"></script>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    h1 {
      margin-bottom: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #1a1a1a;
    }
    th, td {
      padding: 10px;
      border-bottom: 1px solid #333;
      text-align: left;
    }
    th {
      background: #222;
    }
    tr:hover {
      background: #222;
    }
    #last {
      font-weight: bold;
      color: #4caf50;
    }
  </style>
</head>
<body>

  <h1>System-Fixer Dashboard</h1>
  <p>Last scan: <span id="last"></span></p>

  <table>
    <thead>
      <tr>
        <th>SEVERITY</th>
        <th>TITLE</th>
        <th>TARGET</th>
        <th>PROGRAM</th>
        <th>DATE</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <script>
    const rows = document.getElementById("rows");
    const findings = window.FINDINGS || [];

    findings.forEach(f => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${f.severity}</td>
        <td>${f.title}</td>
        <td>${f.target}</td>
        <td>${f.program}</td>
        <td>${f.date}</td>
      `;
      rows.appendChild(tr);
    });

    if (findings.length > 0) {
      document.getElementById("last").innerText = findings[0].date;
    }
  </script>

</body>
</html>
