name: Fetch Programs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Run program fetcher
        run: python system_fixer/program_fetcher.py

      - name: Commit updated programs.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add programs.json || true
          git commit -m "update programs list" || true
          git push || true
