name: Autonomous Daily Scan

on:
  schedule:
    - cron: "0 6 * * *"   # Runs every day at 06:00 UTC
  workflow_dispatch:       # Allows manual Run Workflow button

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install requests dnspython

      - name: Run scanner
        run: |
          python scanner/scan.py

      - name: Generate dashboard data
        run: |
          python scripts/generate_data.py

      - name: Commit updated dashboard data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/*.json dashboard/data.js || true
          git commit -m "Daily scan update" || true
          git push
