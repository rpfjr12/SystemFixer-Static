name: Fetch Programs

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Add repo to PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV

      - name: Install deps
        run: pip install -r requirements.txt || true

      - name: Refresh programs.json
        run: python system_fixer/programs_refresher.py

      - name: Commit updated programs.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add programs.json || true
          git commit -m "auto: refresh programs.json" || true
          git push || true
